<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Animation Example - p5.js 2.0</title>

    <link rel="stylesheet" type="text/css" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/p5@2.2.0/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.2.0/lib/addons/p5.woff2.js"></script>
  </head>

  <body>
    <div id="sketch-container">
      <div id="canvas-wrapper"></div>
      <div class="controls">
        <input
          type="range"
          id="weightSlider1"
          min="200"
          max="700"
          value="200"
        />
        <input
          type="range"
          id="weightSlider2"
          min="200"
          max="700"
          value="500"
        />
        <input
          type="range"
          id="weightSlider3"
          min="200"
          max="700"
          value="700"
        />
        <input type="text" id="textInput" value="Variable Font" />
      </div>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
